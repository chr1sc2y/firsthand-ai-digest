<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Firsthand AI Digest - Apple News Compact Demo</title>
<style>
:root{
  color-scheme:light dark;
  --bg:#f5f5f7;--surface:#fff;--surface2:rgba(255,255,255,.72);
  --ink:#1d1d1f;--muted:#6e6e73;--soft:#86868b;--line:rgba(0,0,0,.1);
  --blue:#0071e3;--blog:#0a84ff;--pod:#af52de;--video:#ff3b30;--post:#5e5ce6;
  --shadow:0 1px 2px rgba(0,0,0,.04),0 14px 34px rgba(0,0,0,.06);
  --display:"SF Pro Display",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  --text:"SF Pro Text",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
}
@media(prefers-color-scheme:dark){:root{--bg:#000;--surface:#1d1d1f;--surface2:rgba(29,29,31,.78);--ink:#f5f5f7;--muted:#a1a1a6;--soft:#6e6e73;--line:rgba(255,255,255,.13);--blue:#2997ff;--shadow:none}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.45 var(--text);-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}.wrap{max-width:1180px;margin:auto;padding:58px 24px 72px}
	.top{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end;border-bottom:1px solid var(--line);padding-bottom:28px}.kicker{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:10px}.top h1{font:700 clamp(48px,7vw,88px)/1.02 var(--display);letter-spacing:0;margin:0}.lede{max-width:590px;color:var(--muted);font-size:19px;margin:16px 0 0}.brief{align-self:end;min-width:250px;background:var(--surface2);border:1px solid var(--line);border-radius:20px;padding:16px;backdrop-filter:blur(18px);box-shadow:var(--shadow)}.brief-label{font-size:12px;color:var(--soft);font-weight:700}.brief-title{display:block;margin-top:6px;color:var(--ink);font-weight:700}.brief .ai-link{display:inline-block;margin-top:8px;color:var(--blue);font-size:12px;font-weight:700;text-decoration:underline}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;margin:22px 0}.seg{display:flex;gap:3px;background:rgba(0,0,0,.05);border-radius:999px;padding:3px}.seg button{border:0;background:transparent;border-radius:999px;padding:7px 14px;color:var(--muted);font:600 13px var(--text);cursor:pointer}.seg button.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.section{margin-top:34px}.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.section-title{display:flex;align-items:center;gap:10px}.dot{width:10px;height:10px;border-radius:99px;background:var(--color)}h2{font:700 24px/1.15 var(--display);margin:0}.count{font:600 12px "SF Mono",ui-monospace;color:var(--soft);text-transform:uppercase}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{position:relative;background:var(--surface2);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:.16s ease;backdrop-filter:blur(18px)}.card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}.card:before{content:"";position:absolute;inset:0 auto 0 0;width:4px;background:var(--color)}.body{padding:18px 18px 16px 22px}.meta{display:flex;justify-content:space-between;gap:12px;color:var(--soft);font-size:12px;margin-bottom:12px}.source{font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.badge{color:var(--color);font-weight:800}.title{font:700 18px/1.22 var(--display);margin:0 0 9px}.summary{color:var(--muted);margin:0;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}.foot{display:flex;justify-content:space-between;gap:12px;border-top:1px solid var(--line);margin-top:14px;padding-top:12px;color:var(--soft);font-size:12px}.open{color:var(--blue);font-weight:700}
@media(max-width:860px){.top{grid-template-columns:1fr}.brief{width:100%}.grid{grid-template-columns:1fr 1fr}}@media(max-width:560px){.wrap{padding:38px 18px}.grid{grid-template-columns:1fr}.top h1{font-size:42px}}
</style>
</head>
<body>
<main class="wrap">
  <section class="top">
    <div>
      <div class="kicker">FIRSTHAND AI DIGEST</div>
      <h1>What builders are saying now.</h1>
      <p class="lede">A clean 24-hour reader for posts, blogs, podcasts, and videos from people building AI.</p>
    </div>
    <aside class="brief" id="briefBox"></aside>
  </section>
  <nav class="toolbar">
    <div class="seg" id="range"></div>
    <div class="seg" id="kind"></div>
  </nav>
  <div id="content"></div>
</main>
<script>
const cfg={blogs:["Blogs & Long-form","Blog","Read", "var(--blog)"],podcasts:["Podcasts","Podcast","Listen","var(--pod)"],videos:["Videos","Video","Watch","var(--video)"],x:["Posts","Post","Open","var(--post)"]};
const ranges=[["24h",24],["3d",72],["7d",168]], kinds=[["all","All"],["blogs","Blogs"],["podcasts","Podcasts"],["videos","Videos"],["x","Posts"]];
let allItems=[], latestEnd=new Date(), state={range:"24h",kind:"all"};
const text=v=>String(v||""); const esc=s=>text(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function strip(s){const el=document.createElement("div");el.innerHTML=text(s);return el.textContent||""}
function time(s){const d=new Date(s);return isNaN(d)?"":d.toLocaleString([], {month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
	function demoPath(path){const p=String(path||"");return /^(https?:|\/|\.\.\/)/.test(p)?p:p.startsWith("data/")?"../"+p:"../data/"+p}
	function plannedZhPath(path){return demoPath(String(path||"").replace(/\.html?$/,".zh.html"))}
async function loadJson(path){const url=demoPath(path);const r=await fetch(url,{cache:"reload"}); if(!r.ok) throw new Error(url); return r.json()}
function flatten(payload){const items=payload.items||{}; return Object.entries({x:"x",blogs:"blogs",podcasts:"podcasts",videos:"videos"}).flatMap(([k,kind])=>(items[k]||[]).map(i=>({...i,kind})))}
function uniq(items){const seen=new Set();return items.filter(i=>{const k=i.link||`${i.source_handle}|${i.summary}|${i.published}`;if(seen.has(k))return false;seen.add(k);return true})}
function filtered(){const hours=ranges.find(r=>r[0]===state.range)[1];const cut=latestEnd.getTime()-hours*3600000;return uniq(allItems).filter(i=>{const t=new Date(i.published||0).getTime();return t>=cut&&t<=latestEnd.getTime()&&(state.kind==="all"||i.kind===state.kind)}).sort((a,b)=>new Date(b.published||0)-new Date(a.published||0))}
function card(i){const c=cfg[i.kind]||cfg.x;const title=i.kind==="x"?strip(i.summary).slice(0,88):strip(i.title);const summary=i.kind==="x"?strip(i.summary):strip(i.summary);return `<article class="card" style="--color:${c[3]}"><div class="body"><div class="meta"><span class="source">${esc(i.source_name||i.author||"Unknown")}</span><span class="badge">${c[1]}</span></div><h3 class="title">${esc(title)}</h3><p class="summary">${esc(summary)}</p><div class="foot"><span>${esc(time(i.published))}</span>${i.link?`<a class="open" href="${esc(i.link)}" target="_blank">${c[2]} ↗</a>`:""}</div></div></article>`}
function render(){document.querySelectorAll("button[data-range]").forEach(b=>b.classList.toggle("active",b.dataset.range===state.range));document.querySelectorAll("button[data-kind]").forEach(b=>b.classList.toggle("active",b.dataset.kind===state.kind));const groups={blogs:[],podcasts:[],videos:[],x:[]};filtered().forEach(i=>groups[i.kind]?.push(i));content.innerHTML=Object.entries(groups).map(([kind,rows])=>rows.length?`<section class="section" style="--color:${cfg[kind][3]}"><div class="section-head"><div class="section-title"><span class="dot"></span><h2>${cfg[kind][0]}</h2></div><span class="count">${rows.length} items</span></div><div class="grid">${rows.map(card).join("")}</div></section>`:"").join("")}
	async function boot(){range.innerHTML=ranges.map(([id])=>`<button data-range="${id}">${id}</button>`).join("");kind.innerHTML=kinds.map(([id,label])=>`<button data-kind="${id}">${label}</button>`).join("");range.onclick=e=>{if(e.target.dataset.range){state.range=e.target.dataset.range;render()}};kind.onclick=e=>{if(e.target.dataset.kind){state.kind=e.target.dataset.kind;render()}};const idx=await loadJson("../data/index.json");const paths=[...(idx.daily||[]).slice(-7).map(d=>d.path),...(idx.segments||[]).slice(-16).map(s=>s.path)];const payloads=await Promise.all([...new Set(paths)].map(loadJson));allItems=payloads.flatMap(flatten);latestEnd=new Date(Math.max(...allItems.map(i=>new Date(i.published||0).getTime()).filter(Boolean)));const briefs=await loadJson("../data/ai-briefs/index.json");const latest=(briefs.briefs||[])[0];const en=esc(demoPath(latest.path));briefBox.innerHTML=`<div class="brief-label">Latest AI Insight</div><a class="ai-link" href="${en}" target="_blank">EN →</a>`;render()}
boot().catch(e=>content.innerHTML=`<p>${esc(e.message)}</p>`);
</script>
</body>
</html>

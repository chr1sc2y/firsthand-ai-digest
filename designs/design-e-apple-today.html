<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Firsthand AI Digest - Apple Today Demo</title>
<style>
:root{color-scheme:light dark;--bg:#f5f5f7;--card:#fff;--ink:#1d1d1f;--muted:#6e6e73;--line:rgba(0,0,0,.1);--blue:#0071e3;--blog:#007aff;--pod:#bf5af2;--video:#ff453a;--post:#34c759;--display:"SF Pro Display",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;--text:"SF Pro Text",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;--shadow:0 18px 48px rgba(0,0,0,.09)}
@media(prefers-color-scheme:dark){:root{--bg:#000;--card:#1d1d1f;--ink:#f5f5f7;--muted:#a1a1a6;--line:rgba(255,255,255,.14);--blue:#2997ff;--shadow:0 18px 48px rgba(0,0,0,.5)}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.45 var(--text);-webkit-font-smoothing:antialiased}a{text-decoration:none;color:inherit}.shell{max-width:1200px;margin:auto;padding:38px 22px 70px}
.nav{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:42px}.brand{font:700 20px var(--display)}.brief{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:rgba(255,255,255,.65);border-radius:999px;padding:8px 14px;backdrop-filter:blur(18px);color:var(--muted);font-weight:600;font-size:13px}.brief-title{color:var(--ink);font-weight:700}.brief .ai-link{margin-left:4px;color:var(--blue);font-weight:700;font-size:12px;border:1px solid var(--line);border-radius:999px;padding:3px 9px;background:rgba(255,255,255,.9)}.brief .ai-link:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.hero{display:grid;grid-template-columns:1.05fr .95fr;gap:20px;align-items:stretch}.hero-main{min-height:360px;border-radius:34px;padding:34px;background:linear-gradient(145deg,#fff,#eaf3ff);box-shadow:var(--shadow);overflow:hidden;position:relative}.hero-main:after{content:"";position:absolute;right:-90px;bottom:-120px;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(0,113,227,.24),transparent 65%)}.eyebrow{font-weight:800;color:var(--blue);font-size:13px;letter-spacing:.02em}.hero h1{position:relative;font:800 clamp(46px,7vw,86px)/.98 var(--display);letter-spacing:0;margin:14px 0 18px;max-width:720px}.lede{position:relative;max-width:580px;color:#515154;font-size:19px;margin:0}.hero-side{display:grid;grid-template-columns:1fr 1fr;gap:14px}.stat{border-radius:26px;padding:20px;background:var(--card);border:1px solid var(--line);box-shadow:0 1px 2px rgba(0,0,0,.04)}.stat strong{display:block;font:800 38px var(--display)}.stat span{color:var(--muted);font-size:13px}
.controls{display:flex;justify-content:space-between;gap:12px;align-items:center;margin:28px 0 20px;flex-wrap:wrap}.seg{display:flex;gap:6px}.seg button{border:0;border-radius:999px;background:var(--card);border:1px solid var(--line);padding:9px 14px;font-weight:700;color:var(--muted);cursor:pointer}.seg button.active{background:#1d1d1f;color:#fff;border-color:#1d1d1f}
.rail{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}.tile{border-radius:24px;padding:18px;color:#fff;background:var(--c);min-height:106px;box-shadow:0 10px 28px color-mix(in srgb,var(--c) 22%,transparent)}.tile b{display:block;font:800 22px var(--display);margin-bottom:6px}.tile span{opacity:.9}
.section{margin-top:24px}.section h2{font:800 30px var(--display);margin:0 0 14px;display:flex;align-items:center;gap:10px}.section h2:before{content:"";width:12px;height:28px;border-radius:99px;background:var(--c)}.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.card{border-radius:28px;overflow:hidden;background:var(--card);border:1px solid var(--line);box-shadow:0 1px 2px rgba(0,0,0,.04);transition:.16s}.card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}.band{height:9px;background:var(--c)}.body{padding:22px 20px 18px}.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;margin-bottom:12px}.kind{color:var(--c);font-weight:900}.title{font:750 23px/1.12 var(--display);margin:0 0 9px}.summary{color:var(--muted);margin:0;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden;line-height:1.45}.foot{display:flex;justify-content:space-between;border-top:1px solid var(--line);margin-top:16px;padding-top:12px;color:var(--muted);font-size:12px}.open{color:var(--blue);font-weight:800}
@media(max-width:880px){.hero{grid-template-columns:1fr}.rail{grid-template-columns:1fr 1fr}.cards{grid-template-columns:1fr}}@media(max-width:560px){.nav{align-items:flex-start;flex-direction:column}.hero-main{padding:26px;border-radius:28px}.hero-side,.rail{grid-template-columns:1fr}.hero h1{font-size:42px}.brief{border-radius:18px;align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<main class="shell">
  <header class="nav"><div class="brand">Firsthand AI Digest</div><div class="brief" id="brief"></div></header>
  <section class="hero">
    <div class="hero-main"><div class="eyebrow">TODAY IN AI</div><h1>Signals from the people shipping the future.</h1><p class="lede">A more editorial homepage: clear category color, fewer tiny pills, stronger cards, and the AI interpretation tucked away as a companion read.</p></div>
    <div class="hero-side" id="stats"></div>
  </section>
  <div class="controls"><div class="seg" id="range"></div><div class="seg" id="kind"></div></div>
  <section class="rail" id="rail"></section>
  <div id="content"></div>
</main>
<script>
const C={blogs:["Blogs","Blog","Read","var(--blog)"],podcasts:["Podcasts","Podcast","Listen","var(--pod)"],videos:["Videos","Video","Watch","var(--video)"],x:["Posts","Post","Open","var(--post)"]};
const ranges=[["24h",24],["3d",72],["7d",168]], kinds=[["all","All"],["blogs","Blogs"],["podcasts","Podcasts"],["videos","Videos"],["x","Posts"]];
let all=[],latestEnd=new Date(),state={range:"24h",kind:"all"};const esc=s=>String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));function strip(s){let e=document.createElement("div");e.innerHTML=s||"";return e.textContent||""}function demoPath(path){let p=String(path||"");return /^(https?:|\/|\.\.\/)/.test(p)?p:p.startsWith("data/")?"../"+p:"../data/"+p}async function j(p){let url=demoPath(p);let r=await fetch(url,{cache:"reload"});if(!r.ok)throw Error(url);return r.json()}function flat(p){let it=p.items||{};return Object.entries({x:"x",blogs:"blogs",podcasts:"podcasts",videos:"videos"}).flatMap(([k,kind])=>(it[k]||[]).map(x=>({...x,kind})))}function unique(a){let s=new Set;return a.filter(i=>{let k=i.link||`${i.summary}|${i.published}`;if(s.has(k))return false;s.add(k);return true})}function rows(){let h=ranges.find(r=>r[0]===state.range)[1],cut=latestEnd-h*36e5;return unique(all).filter(i=>{let t=+new Date(i.published||0);return t>=cut&&t<=latestEnd&&(state.kind==="all"||i.kind===state.kind)}).sort((a,b)=>+new Date(b.published||0)-+new Date(a.published||0))}function when(s){let d=new Date(s);return isNaN(d)?"":d.toLocaleString([],{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
function render(){document.querySelectorAll("button[data-range]").forEach(b=>b.classList.toggle("active",b.dataset.range===state.range));document.querySelectorAll("button[data-kind]").forEach(b=>b.classList.toggle("active",b.dataset.kind===state.kind));let grouped={blogs:[],podcasts:[],videos:[],x:[]};rows().forEach(i=>grouped[i.kind]?.push(i));stats.innerHTML=Object.entries(grouped).map(([k,v])=>`<div class="stat"><strong>${v.length}</strong><span>${C[k][0]}</span></div>`).join("");rail.innerHTML=Object.entries(grouped).map(([k,v])=>`<div class="tile" style="--c:${C[k][3]}"><b>${C[k][0]}</b><span>${v.length} fresh items</span></div>`).join("");content.innerHTML=Object.entries(grouped).map(([k,v])=>v.length?`<section class="section" style="--c:${C[k][3]}"><h2>${C[k][0]}</h2><div class="cards">${v.map(card).join("")}</div></section>`:"").join("")}
function card(i){let c=C[i.kind],title=i.kind==="x"?strip(i.summary).slice(0,96):strip(i.title),sum=i.kind==="x"?strip(i.summary):strip(i.summary);return `<article class="card" style="--c:${c[3]}"><div class="band"></div><div class="body"><div class="meta"><span>${esc(i.source_name||i.author||"Unknown")}</span><span class="kind">${c[1]}</span></div><h3 class="title">${esc(title)}</h3><p class="summary">${esc(sum)}</p><div class="foot"><span>${esc(when(i.published))}</span>${i.link?`<a class="open" href="${esc(i.link)}" target="_blank">${c[2]} ↗</a>`:""}</div></div></article>`}
async function boot(){range.innerHTML=ranges.map(([id])=>`<button data-range="${id}">${id}</button>`).join("");kind.innerHTML=kinds.map(([id,l])=>`<button data-kind="${id}">${l}</button>`).join("");range.onclick=e=>{if(e.target.dataset.range){state.range=e.target.dataset.range;render()}};kind.onclick=e=>{if(e.target.dataset.kind){state.kind=e.target.dataset.kind;render()}};let idx=await j("../data/index.json"),paths=[...(idx.daily||[]).slice(-7).map(d=>d.path),...(idx.segments||[]).slice(-16).map(s=>s.path)];let payloads=await Promise.all([...new Set(paths)].map(j));all=payloads.flatMap(flat);latestEnd=Math.max(...all.map(i=>+new Date(i.published||0)).filter(Boolean));let b=await j("../data/ai-briefs/index.json"),latest=b.briefs[0];const enHref = esc(demoPath(latest.path));brief.innerHTML=`<span>Latest AI Brief</span><span class="brief-title">${esc(latest.date)}</span><a class="ai-link" href="${enHref}" target="_blank">Read →</a>`;render()}boot().catch(e=>content.innerHTML=`<p>${esc(e.message)}</p>`);
</script>
</body>
</html>

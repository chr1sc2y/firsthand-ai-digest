name: Daily Digest

on:
  schedule:
    # Once daily at 06:17 Asia/Shanghai (22:17 UTC). The 17-minute offset avoids
    # the busiest scheduler window, and the 06:00 anchor keeps the 08:00 Insight
    # brief current while covering one complete 24-hour source window.
    - cron: "17 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest

      - name: Generate config/secrets.json
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          if [ -z "$APIFY_TOKEN" ]; then
            echo "::error::Repository secret APIFY_TOKEN is not set."
            exit 1
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          Path("config/secrets.json").write_text(
              json.dumps(
                  {
                      "apify_token": os.environ["APIFY_TOKEN"],
                      "apify_actor": "kaitoeasyapi~twitter-x-data-tweet-scraper-pay-per-result-cheapest",
                      "apify_lookback_hours": 24,
                      "apify_monthly_budget_usd": 4.0,
                  },
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          PY

      - name: Compute daily window
        run: python scripts/segment_window.py --hours 24 --anchor-hour 6 --github-env "$GITHUB_ENV"

      - name: Build daily digest
        run: |
          python scripts/run.py \
            --verbose \
            --max-per-source 20 \
            --hours 24 \
            --blog-hours 24 \
            --video-hours 24 \
            --podcast-hours 24 \
            --window-start "$DIGEST_WINDOW_START" \
            --window-end "$DIGEST_WINDOW_END" \
            --data-output "$DIGEST_SEGMENT_PATH" \
            --skip-empty-segment \
            --output dist/index.html

      - name: Build AI Insight source pack
        run: |
          python scripts/build_insight_source_pack.py \
            --segment "$DIGEST_SEGMENT_PATH" \
            --output "$INSIGHT_SOURCE_PACK_PATH" \
            --max-sources 120

      - name: Generate bilingual AI Insight brief
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "::error::Repository secret DEEPSEEK_API_KEY is not set."
            exit 1
          fi
          python scripts/generate_ai_brief.py \
            --source-pack "$INSIGHT_SOURCE_PACK_PATH" \
            --date "$INSIGHT_BRIEF_DATE" \
            --output-dir staging/drafts

      - name: Publish AI Insight brief
        run: |
          python scripts/publish_ai_brief.py \
            "staging/drafts/firsthand-ai-brief-${INSIGHT_BRIEF_DATE}.html"

      - name: Build archive and site
        run: python scripts/archive_data.py --render-hours 24

      - name: Commit digest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git add -u dist
          if git diff --cached --quiet; then
            echo "No digest data changes to commit."
          else
            git commit -m "Add digest segment ${DIGEST_SEGMENT_DATE} ${DIGEST_SEGMENT_HOUR}:00"
            pushed=false
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push origin HEAD:main; then
                pushed=true
                break
              fi
              echo "Push attempt $attempt failed, retrying in a few seconds..."
              sleep $((RANDOM % 10 + 5))
            done
            if [ "$pushed" != true ]; then
              echo "::error::Failed to persist generated digest data after 3 attempts."
              exit 1
            fi
          fi

      - name: Sync Insight repository
        env:
          INSIGHT_REPO_TOKEN: ${{ secrets.INSIGHT_REPO_TOKEN }}
        run: |
          if [ -z "$INSIGHT_REPO_TOKEN" ]; then
            echo "::warning::Repository secret INSIGHT_REPO_TOKEN is not set; skipping Insight repository sync."
            exit 0
          fi

          git clone "https://x-access-token:${INSIGHT_REPO_TOKEN}@github.com/chr1sc2y/firsthand-ai-insight.git" ../firsthand-ai-insight
          python scripts/sync_insight_site.py --target-dir ../firsthand-ai-insight
          cd ../firsthand-ai-insight
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No Insight site changes to commit."
          else
            git commit -m "Sync AI insight briefs"
            git push origin HEAD:main
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before retrying Pages deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Fail after Pages deployment retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: exit 1
